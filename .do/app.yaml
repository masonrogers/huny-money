name: huny-money
region: nyc
services:
  - name: web
    git:
      repo_clone_url: https://github.com/masonrogers/huny-money.git
      branch: main
    build_command: npm run build
    # On the v1→v3 transition (one-shot) the migrate script detects v1 tables
    # and drops the public schema. On subsequent deploys (v3 already in
    # place), the script no-ops. drizzle-kit push --force then creates or
    # updates the schema. Idempotent across deploys.
    run_command: npx tsx scripts/migrate-v1-to-v3.ts && npx drizzle-kit push --force && npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /api/healthz
      initial_delay_seconds: 90
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
        scope: RUN_AND_BUILD_TIME
      - key: COINBASE_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: COINBASE_API_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: APP_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: CRON_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
        scope: BUILD_TIME

databases:
  - name: db
    engine: PG
    cluster_name: db-postgresql-nyc3-00644
    db_name: huny_money
    db_user: doadmin
    production: true
