name: huny-money
region: nyc
services:
  - name: web
    github:
      repo: masonrogers/huny-money
      branch: main
      deploy_on_push: true
    build_command: npx drizzle-kit push --force && npm run build
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /api/healthz
      initial_delay_seconds: 60
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
        scope: RUN_AND_BUILD_TIME
      - key: COINBASE_API_KEY
        value: placeholder
        scope: RUN_TIME
        type: SECRET
      - key: COINBASE_API_SECRET
        value: placeholder
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        value: 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
        scope: RUN_TIME
        type: SECRET
      - key: CRON_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APP_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET

databases:
  - name: db
    engine: PG
    cluster_name: db-postgresql-nyc3-00644
    db_name: huny_money
    db_user: doadmin
    production: true
