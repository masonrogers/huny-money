name: Live smoke

# Hits real Coinbase + Anthropic. Manual-trigger by default; weekly run
# catches credential expiry and Coinbase API drift before the bot does.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"  # Mondays 12:00 UTC

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    env:
      COINBASE_API_KEY: ${{ secrets.COINBASE_API_KEY }}
      COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATABASE_URL: postgres://stub:stub@localhost:5432/stub
      APP_SECRET: stub_app_secret_at_least_32_bytes_long_for_jwt_signing
      ADMIN_PASSWORD: stub
      CRON_SECRET: stub
      RUN_LIVE_SMOKE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Verify Coinbase secret is the funded key
        run: |
          if [ -z "$COINBASE_API_KEY" ] || [ -z "$COINBASE_API_SECRET" ]; then
            echo "Coinbase secrets not set."
            exit 1
          fi
          # The funded key starts with 88674a25; the empty key starts with 7b288729.
          # Hard fail if the empty key was uploaded by mistake.
          if echo "$COINBASE_API_KEY" | grep -q "7b288729"; then
            echo "ERROR: COINBASE_API_KEY appears to be the empty key 7b288729. Use 88674a25."
            exit 1
          fi
      - run: npm ci
      - name: Run live Coinbase smoke
        run: npx vitest run coinbase-smoke
